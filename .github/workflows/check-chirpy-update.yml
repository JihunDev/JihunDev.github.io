name: "Check Chirpy Version Update"

# ─────────────────────────────────────────────
# 공식 Upgrade Guide 방식 적용:
#   git remote add chirpy https://github.com/cotes2020/chirpy-starter.git
#   git fetch chirpy --tags
#   git merge vX.Y.Z --squash --allow-unrelated-histories
#   bundle update
#
# 버전 추적: Gemfile의 pessimistic constraint (~> X.Y) 활용
#   - Gemfile.lock은 .gitignore 처리되어 사용 불가
#   - 추가 파일 없이 이미 커밋된 Gemfile만 사용
#   - ~> 7.5 = "현재 7.5 시리즈" → latest가 7.6.x 이상이면 업데이트
# ─────────────────────────────────────────────

on:
  schedule:
    - cron: "0 9 * * 1" # 매주 월요일 오전 9시 (UTC) = 한국시간 오후 6시
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# ─────────────────────────────────────────────
# Job 1: 버전 비교
# ─────────────────────────────────────────────
jobs:
  check-update:
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.compare.outputs.needs_update }}
      current_constraint: ${{ steps.current.outputs.constraint }}
      latest_version: ${{ steps.latest.outputs.version }}
      latest_minor: ${{ steps.latest.outputs.minor }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Gemfile의 ~> X.Y 제약 조건에서 현재 시리즈(X.Y) 추출
      # 예: gem "jekyll-theme-chirpy", "~> 7.5"  →  constraint=7.5
      - name: Get current version series from Gemfile
        id: current
        run: |
          CONSTRAINT=$(grep 'jekyll-theme-chirpy' Gemfile \
            | grep -oP '~> \K\d+\.\d+')
          if [ -z "$CONSTRAINT" ]; then
            echo "::error::Gemfile에서 jekyll-theme-chirpy의 버전 제약을 찾을 수 없습니다."
            exit 1
          fi
          echo "constraint=${CONSTRAINT}" >> $GITHUB_OUTPUT
          echo "📌 Current series: ~> ${CONSTRAINT} (tracks ${CONSTRAINT}.x)"

      # chirpy-starter 최신 릴리즈 태그 조회
      - name: Get latest version from chirpy-starter releases
        id: latest
        run: |
          RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/cotes2020/chirpy-starter/releases/latest")
          if [ $? -ne 0 ]; then
            echo "::error::chirpy-starter 최신 버전 조회에 실패했습니다."
            exit 1
          fi
          LATEST=$(echo "$RESPONSE" | jq -r '.tag_name' | sed 's/^v//')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "::error::버전 파싱에 실패했습니다."
            exit 1
          fi
          # major.minor만 추출 (예: 7.6.0 → 7.6)
          LATEST_MINOR=$(echo "$LATEST" | cut -d. -f1,2)
          echo "version=${LATEST}" >> $GITHUB_OUTPUT
          echo "minor=${LATEST_MINOR}" >> $GITHUB_OUTPUT
          echo "🚀 Latest: v${LATEST} (series ${LATEST_MINOR})"

      # 현재 Gemfile 시리즈(~> X.Y)와 최신 시리즈(X.Y) 비교
      # 같은 시리즈(7.5 == 7.5)면 스킵, 다른 시리즈(7.5 != 7.6)면 업데이트
      - name: Compare version series
        id: compare
        run: |
          CURRENT="${{ steps.current.outputs.constraint }}"
          LATEST_MINOR="${{ steps.latest.outputs.minor }}"
          LATEST="${{ steps.latest.outputs.version }}"

          if [ "$CURRENT" = "$LATEST_MINOR" ]; then
            echo "✅ 이미 최신 시리즈입니다 (~> ${CURRENT}). 작업을 종료합니다."
            echo "needs_update=false" >> $GITHUB_OUTPUT
          else
            echo "⬆️ 새 시리즈 발견: ~> ${CURRENT} → ~> ${LATEST_MINOR} (v${LATEST})"
            echo "needs_update=true" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────
  # Job 2: 브랜치 생성 및 PR 오픈
  # ─────────────────────────────────────────────
  create-update-branch:
    needs: check-update
    if: needs.check-update.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    env:
      CURRENT_CONSTRAINT: ${{ needs.check-update.outputs.current_constraint }}
      LATEST_VERSION: ${{ needs.check-update.outputs.latest_version }}
      LATEST_MINOR: ${{ needs.check-update.outputs.latest_minor }}
      BRANCH_NAME: update/chirpy-v${{ needs.check-update.outputs.latest_version }}

    steps:
      - name: Checkout (full history 필요)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 동일 버전 브랜치가 이미 있으면 중복 실행 방지
      - name: Check if update branch already exists
        id: branch_check
        run: |
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" > /dev/null 2>&1; then
            echo "⚠️ 브랜치 '$BRANCH_NAME' 이 이미 존재합니다. 건너뜁니다."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create update branch
        if: steps.branch_check.outputs.exists == 'false'
        run: git checkout -b "$BRANCH_NAME"

      # ── 공식 Upgrade Guide Step 1 ──────────────
      - name: Add chirpy-starter as upstream remote
        if: steps.branch_check.outputs.exists == 'false'
        run: |
          git remote add chirpy https://github.com/cotes2020/chirpy-starter.git
          git config submodule.assets/lib.ignore all 2>/dev/null || true

      # ── 공식 Upgrade Guide Step 2 ──────────────
      - name: Fetch tag and squash merge
        if: steps.branch_check.outputs.exists == 'false'
        run: |
          echo "📥 v${LATEST_VERSION} 태그 fetch 중..."
          git fetch chirpy "v${LATEST_VERSION}" --tags

          echo "🔀 squash merge 적용 중..."
          git merge "v${LATEST_VERSION}" \
            --squash \
            --allow-unrelated-histories \
            -X theirs \
            --no-commit || true

      # 사용자 파일 보존 (merge로 덮어쓰이면 안 되는 것들)
      - name: Restore user-specific files
        if: steps.branch_check.outputs.exists == 'false'
        run: |
          PROTECTED_FILES=("_config.yml" "_data/contact.yml" "_data/share.yml")
          PROTECTED_DIRS=("_posts" "assets/img" ".github/workflows")

          for f in "${PROTECTED_FILES[@]}"; do
            if git ls-files --error-unmatch "$f" 2>/dev/null; then
              git checkout HEAD -- "$f"
              echo "🔒 보존됨: $f"
            fi
          done
          for d in "${PROTECTED_DIRS[@]}"; do
            if [ -d "$d" ]; then
              git checkout HEAD -- "$d" 2>/dev/null && echo "🔒 보존됨: $d/" || true
            fi
          done

      # Gemfile의 버전 제약을 새 시리즈로 업데이트
      # ~> 7.5  →  ~> 7.6
      - name: Update Gemfile version constraint
        if: steps.branch_check.outputs.exists == 'false'
        run: |
          sed -i "s/gem \"jekyll-theme-chirpy\", \"~> ${CURRENT_CONSTRAINT}\"/gem \"jekyll-theme-chirpy\", \"~> ${LATEST_MINOR}\"/" Gemfile
          echo "📝 Gemfile 제약 업데이트: ~> ${CURRENT_CONSTRAINT} → ~> ${LATEST_MINOR}"
          grep 'jekyll-theme-chirpy' Gemfile

      # ── 공식 Upgrade Guide 마지막 단계 ──────────
      - name: Setup Ruby
        if: steps.branch_check.outputs.exists == 'false'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: false

      - name: Run bundle update
        if: steps.branch_check.outputs.exists == 'false'
        run: |
          gem install bundler --no-document
          bundle update

      # 커밋 & 푸시
      - name: Commit and push
        if: steps.branch_check.outputs.exists == 'false'
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "⚠️ 변경사항이 없습니다."
            exit 0
          fi
          git commit -m "chore: upgrade chirpy-starter ~> ${CURRENT_CONSTRAINT} → ~> ${LATEST_MINOR}

          - chirpy-starter v${LATEST_VERSION} squash merge (공식 Upgrade Guide 방식)
          - Gemfile 제약 업데이트: ~> ${CURRENT_CONSTRAINT} → ~> ${LATEST_MINOR}
          - 사용자 파일 보존: _config.yml, _data/, _posts/, assets/img/, .github/workflows/"

          git push origin "$BRANCH_NAME"

      # PR 생성
      - name: Create Pull Request
        if: steps.branch_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base master \
            --head "$BRANCH_NAME" \
            --title "⬆️ Upgrade chirpy-starter: ~> ${CURRENT_CONSTRAINT} → ~> ${LATEST_MINOR} (v${LATEST_VERSION})" \
            --label "dependencies,automated" \
            --body "## 🎉 Chirpy Starter 버전 업데이트

          | | |
          |:---|:---|
          | **Gemfile 이전** | \`~> ${CURRENT_CONSTRAINT}\` |
          | **Gemfile 이후** | \`~> ${LATEST_MINOR}\` |
          | **적용 버전** | \`v${LATEST_VERSION}\` |

          ---

          ### 🔄 적용된 업그레이드 방식

          공식 [Upgrade Guide](https://github.com/cotes2020/jekyll-theme-chirpy/wiki/Upgrade-Guide)에 따라 \`chirpy-starter\` upstream을 squash merge 방식으로 적용했습니다.

          \`\`\`bash
          git remote add chirpy https://github.com/cotes2020/chirpy-starter.git
          git fetch chirpy --tags
          git merge v${LATEST_VERSION} --squash --allow-unrelated-histories
          bundle update
          \`\`\`

          ### 🔒 자동으로 보존된 사용자 파일

          - \`_config.yml\` — 블로그 개인 설정
          - \`_data/contact.yml\`, \`_data/share.yml\`
          - \`_posts/\` — 블로그 포스트 전체
          - \`assets/img/\` — 사용자 이미지
          - \`.github/workflows/\` — GitHub Actions

          > ⚠️ **주의**: \`_config.yml\`에 새로 추가된 설정 키가 있을 수 있으니 Release Notes를 반드시 확인하세요.

          ---

          ### 📋 Release Notes

          - 👉 [chirpy-starter v${LATEST_VERSION}](https://github.com/cotes2020/chirpy-starter/releases/tag/v${LATEST_VERSION})
          - 👉 [jekyll-theme-chirpy v${LATEST_VERSION}](https://github.com/cotes2020/jekyll-theme-chirpy/releases/tag/v${LATEST_VERSION})

          ---

          ### ✅ Merge 전 확인 체크리스트

          - [ ] Release Notes에서 **Breaking Changes** 및 설정 변경사항 확인
          - [ ] \`_config.yml\`에 새로 추가된 설정 키가 있는지 비교
          - [ ] 로컬에서 \`bundle exec jekyll serve\` 실행 후 정상 렌더링 확인
          - [ ] 모든 포스트가 정상적으로 보이는지 검토
          - [ ] Pages Deploy 워크플로우 정상 빌드 확인
          - [ ] 충돌 마커(\`<<<<<<<\`)가 남아있는 파일 없는지 확인

          ---

          > 🤖 이 PR은 [Check Chirpy Version Update](.github/workflows/check-chirpy-update.yml) 워크플로우에 의해 자동 생성되었습니다."
